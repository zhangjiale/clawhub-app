<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="'Noto Sans CJK SC', 'Noto Sans CJK TC', 'Droid Sans', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowBold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
    <style>
      .title { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 13px; fill: #64748b; }
      .lane { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .label { font-size: 14px; font-weight: 600; fill: #0f172a; }
      .small { font-size: 12px; fill: #475569; }
      .tiny { font-size: 11px; fill: #64748b; }
      .node { stroke: #475569; stroke-width: 1.2; }
      .zone { fill: none; stroke: #94a3b8; stroke-width: 1.2; stroke-dasharray: 6 5; }
      .input { fill: #dbeafe; }
      .process { fill: #e0e7ff; }
      .storage { fill: #ccfbf1; }
      .external { fill: #fed7aa; }
      .neutral { fill: #f1f5f9; }
      .edge { stroke: #475569; stroke-width: 1.6; fill: none; }
      .edgeBold { stroke: #0f172a; stroke-width: 2.2; fill: none; }
      .flowNum { font-size: 14px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="1400" height="1000" fill="#f8fafc"/>

  <!-- 标题 -->
  <text x="700" y="38" text-anchor="middle" class="title">ClawHub App 系统架构图</text>
  <text x="700" y="60" text-anchor="middle" class="subtitle">Flutter 客户端 + 自建后端 + OpenClaw Gateway + LLM Provider</text>

  <!-- ============ 泳道标签 ============ -->
  <text x="135" y="100" text-anchor="middle" class="lane">① 客户端层</text>
  <text x="500" y="100" text-anchor="middle" class="lane">② 自建后端 (ClawHub Backend)</text>
  <text x="900" y="100" text-anchor="middle" class="lane">③ OpenClaw Gateway</text>
  <text x="1240" y="100" text-anchor="middle" class="lane">④ LLM Provider</text>

  <!-- ============ 客户端层 ============ -->
  <g>
    <rect x="40" y="120" width="190" height="90" rx="10" class="node input"/>
    <text x="135" y="155" text-anchor="middle" class="label">Flutter App</text>
    <text x="135" y="178" text-anchor="middle" class="small">iOS / Android</text>
    <text x="135" y="198" text-anchor="middle" class="tiny">WebSocket + REST</text>

    <rect x="40" y="230" width="190" height="60" rx="10" class="node neutral"/>
    <text x="135" y="258" text-anchor="middle" class="small">未来: Web / Desktop</text>
    <text x="135" y="278" text-anchor="middle" class="tiny">同一套 HTTP/WS 协议</text>

    <rect x="40" y="310" width="190" height="50" rx="10" class="node neutral"/>
    <text x="135" y="340" text-anchor="middle" class="small">本地存储 (SQLite)</text>
  </g>

  <!-- ============ 自建后端 ============ -->
  <!-- 大框 -->
  <rect x="260" y="120" width="480" height="440" rx="14" class="zone"/>
  <text x="280" y="145" class="lane" fill="#4338ca">ClawHub Backend (Java / Spring Boot 3 + WebFlux)</text>

  <!-- 对 App 侧 -->
  <text x="280" y="172" class="small" font-weight="700">↔ 对 App 侧</text>
  <rect x="280" y="180" width="200" height="62" rx="8" class="node process"/>
  <text x="380" y="207" text-anchor="middle" class="label">WebSocket Server</text>
  <text x="380" y="226" text-anchor="middle" class="tiny">长连接 / 心跳 / 推送</text>

  <rect x="500" y="180" width="220" height="62" rx="8" class="node process"/>
  <text x="610" y="207" text-anchor="middle" class="label">REST API</text>
  <text x="610" y="226" text-anchor="middle" class="tiny">历史 / 配置 / 列表</text>

  <!-- 中间核心 -->
  <text x="280" y="265" class="small" font-weight="700">⚙ 核心模块</text>
  <rect x="280" y="272" width="200" height="50" rx="8" class="node process"/>
  <text x="380" y="303" text-anchor="middle" class="label">JWT Auth Filter</text>

  <rect x="500" y="272" width="220" height="50" rx="8" class="node process"/>
  <text x="610" y="303" text-anchor="middle" class="label">Session Manager</text>

  <rect x="280" y="332" width="200" height="50" rx="8" class="node process"/>
  <text x="380" y="363" text-anchor="middle" class="label">Message Router</text>

  <rect x="500" y="332" width="220" height="50" rx="8" class="node process"/>
  <text x="610" y="363" text-anchor="middle" class="label">History Writer / Reader</text>

  <!-- 对 Gateway 侧 -->
  <text x="280" y="405" class="small" font-weight="700">↔ 对 Gateway 侧</text>
  <rect x="280" y="412" width="200" height="62" rx="8" class="node process"/>
  <text x="380" y="439" text-anchor="middle" class="label">WebSocket Client</text>
  <text x="380" y="458" text-anchor="middle" class="tiny">nodes 协议 / 订阅</text>

  <rect x="500" y="412" width="220" height="62" rx="8" class="node process"/>
  <text x="610" y="439" text-anchor="middle" class="label">Gateway API Key 持有</text>
  <text x="610" y="458" text-anchor="middle" class="tiny">限流 / 重试 / 审计</text>

  <!-- 底部说明 -->
  <text x="280" y="500" class="small" font-weight="700">📦 部署形态</text>
  <rect x="280" y="507" width="440" height="40" rx="8" class="node neutral"/>
  <text x="500" y="532" text-anchor="middle" class="small">单进程多 Reactor · Docker Compose 部署 · 内网与 Gateway 同机房</text>

  <!-- ============ Gateway ============ -->
  <rect x="780" y="120" width="240" height="440" rx="14" class="zone"/>
  <text x="800" y="145" class="lane" fill="#c2410c">OpenClaw Gateway</text>

  <rect x="800" y="172" width="200" height="50" rx="8" class="node external"/>
  <text x="900" y="203" text-anchor="middle" class="label">WS RPC 入口</text>

  <rect x="800" y="232" width="200" height="50" rx="8" class="node external"/>
  <text x="900" y="263" text-anchor="middle" class="label">Agent 调度器</text>

  <rect x="800" y="292" width="200" height="50" rx="8" class="node external"/>
  <text x="900" y="323" text-anchor="middle" class="label">Cron 调度器</text>

  <rect x="800" y="352" width="200" height="50" rx="8" class="node external"/>
  <text x="900" y="383" text-anchor="middle" class="label">Memory / Session</text>

  <rect x="800" y="412" width="200" height="50" rx="8" class="node external"/>
  <text x="900" y="443" text-anchor="middle" class="label">Tool Registry</text>

  <rect x="800" y="472" width="200" height="50" rx="8" class="node neutral"/>
  <text x="900" y="503" text-anchor="middle" class="tiny">节点协议 / 多 agent / 记忆</text>

  <!-- ============ LLM Provider ============ -->
  <rect x="1060" y="120" width="320" height="440" rx="14" class="zone"/>
  <text x="1080" y="145" class="lane" fill="#1d4ed8">LLM Provider</text>

  <rect x="1080" y="172" width="280" height="50" rx="8" class="node input"/>
  <text x="1220" y="203" text-anchor="middle" class="label">DeepSeek (主)</text>

  <rect x="1080" y="232" width="280" height="50" rx="8" class="node input"/>
  <text x="1220" y="263" text-anchor="middle" class="label">MiniMax-M3 (fallback)</text>

  <rect x="1080" y="292" width="280" height="50" rx="8" class="node input"/>
  <text x="1220" y="323" text-anchor="middle" class="label">Claude / GPT (备选)</text>

  <rect x="1080" y="352" width="280" height="50" rx="8" class="node neutral"/>
  <text x="1220" y="383" text-anchor="middle" class="small">HTTPS API · Token 计费</text>

  <rect x="1080" y="412" width="280" height="100" rx="8" class="node neutral"/>
  <text x="1220" y="442" text-anchor="middle" class="small" font-weight="700">可插拔</text>
  <text x="1220" y="462" text-anchor="middle" class="tiny">Gateway providers 配置驱动</text>
  <text x="1220" y="480" text-anchor="middle" class="tiny">不需后端改动</text>
  <text x="1220" y="498" text-anchor="middle" class="tiny">按 agent 维度选模型</text>

  <!-- ============ 关键连接线 ============ -->
  <!-- App → Backend WS -->
  <path d="M 230 180 L 278 200" class="edgeBold" marker-end="url(#arrowBold)"/>
  <text x="232" y="174" class="tiny">WS</text>

  <!-- App → Backend REST -->
  <path d="M 230 260 L 278 220" class="edge" marker-end="url(#arrow)"/>
  <text x="232" y="245" class="tiny">REST</text>

  <!-- Backend → Gateway -->
  <path d="M 740 443 L 778 240" class="edgeBold" marker-end="url(#arrowBold)"/>
  <text x="745" y="350" class="tiny">nodes 协议 (WS)</text>

  <!-- Gateway → LLM -->
  <path d="M 1000 200 L 1078 200" class="edgeBold" marker-end="url(#arrowBold)"/>
  <text x="1015" y="194" class="tiny">HTTPS</text>
  <path d="M 1000 260 L 1078 260" class="edge" marker-end="url(#arrow)"/>
  <path d="M 1000 320 L 1078 320" class="edge" marker-end="url(#arrow)"/>

  <!-- ============ 基础设施层 ============ -->
  <line x1="40" y1="600" x2="1360" y2="600" class="edge" stroke-dasharray="3 4"/>
  <text x="700" y="630" text-anchor="middle" class="lane">⑤ 基础设施层 (Docker Compose)</text>

  <rect x="120" y="650" width="220" height="90" rx="10" class="node storage"/>
  <text x="230" y="685" text-anchor="middle" class="label">Redis</text>
  <text x="230" y="708" text-anchor="middle" class="small">Session 映射</text>
  <text x="230" y="725" text-anchor="middle" class="small">在线状态 · 限流计数</text>

  <rect x="380" y="650" width="220" height="90" rx="10" class="node storage"/>
  <text x="490" y="685" text-anchor="middle" class="label">MySQL 8</text>
  <text x="490" y="708" text-anchor="middle" class="small">对话历史 (按 agent)</text>
  <text x="490" y="725" text-anchor="middle" class="small">用户偏好 · 设备表</text>

  <rect x="640" y="650" width="220" height="90" rx="10" class="node neutral"/>
  <text x="750" y="685" text-anchor="middle" class="label">MinIO / OSS</text>
  <text x="750" y="708" text-anchor="middle" class="small">图片 / 语音 / 文件</text>
  <text x="750" y="725" text-anchor="middle" class="small">App 上传中转</text>

  <rect x="900" y="650" width="220" height="90" rx="10" class="node neutral"/>
  <text x="1010" y="685" text-anchor="middle" class="label">Nginx</text>
  <text x="1010" y="708" text-anchor="middle" class="small">WSS 反代</text>
  <text x="1010" y="725" text-anchor="middle" class="small">TLS / 限流 / 静态</text>

  <rect x="1160" y="650" width="200" height="90" rx="10" class="node neutral"/>
  <text x="1260" y="685" text-anchor="middle" class="label">Docker Compose</text>
  <text x="1260" y="708" text-anchor="middle" class="small">单机编排</text>
  <text x="1260" y="725" text-anchor="middle" class="small">后期迁 K8s</text>

  <!-- 基础设施连接 -->
  <path d="M 500 547 L 230 650" class="edge" marker-end="url(#arrow)"/>
  <path d="M 500 547 L 490 650" class="edge" marker-end="url(#arrow)"/>
  <path d="M 610 547 L 750 650" class="edge" marker-end="url(#arrow)"/>

  <!-- ============ 关键数据流 ============ -->
  <rect x="40" y="770" width="1320" height="180" rx="12" class="zone"/>
  <text x="60" y="798" class="lane">关键数据流</text>

  <!-- 流程 1 -->
  <circle cx="80" cy="830" r="14" fill="#0f172a"/>
  <text x="80" y="836" text-anchor="middle" fill="#fff" class="flowNum">1</text>
  <text x="110" y="828" class="label">消息发送 (同步流)</text>
  <text x="110" y="848" class="small">App WS → 后端 WS Server → Auth → Message Router → WS Client (nodes) → Gateway → LLM</text>
  <text x="110" y="865" class="tiny">每跳加 traceId；后端做超时与重试；Gateway 端用流式响应 (SSE/分片) 推回</text>

  <!-- 流程 2 -->
  <circle cx="80" cy="890" r="14" fill="#0f172a"/>
  <text x="80" y="896" text-anchor="middle" fill="#fff" class="flowNum">2</text>
  <text x="110" y="888" class="label">消息接收 (异步流)</text>
  <text x="110" y="908" class="small">LLM → Gateway → 后端 WS Client → History Writer (落 MySQL) → Message Router → WS Server → App</text>
  <text x="110" y="925" class="tiny">先落库再推送，保证历史不丢；失败时重试 + 死信队列</text>

  <!-- 流程 3 (右下角) -->
  <circle cx="80" cy="950" r="14" fill="#0f172a"/>
  <text x="80" y="956" text-anchor="middle" fill="#fff" class="flowNum">3</text>
  <text x="110" y="948" class="label">多 Agent 路由</text>
  <text x="110" y="968" class="small">App 一个 WebSocket → Session Manager 维护 N 个 Gateway session 映射 → 按 agentId 切换</text>
  <text x="110" y="985" class="tiny">Redis 存 {app_session → [{agentId, gw_session, status}]}，支持切换 / 并行</text>

  <!-- 图例 -->
  <g transform="translate(820, 815)">
    <text x="0" y="0" class="label">图例</text>
    <rect x="0" y="14" width="22" height="14" class="input"/>
    <text x="30" y="25" class="small">客户端 / LLM</text>
    <rect x="0" y="38" width="22" height="14" class="process"/>
    <text x="30" y="49" class="small">自建后端模块</text>
    <rect x="170" y="14" width="22" height="14" class="external"/>
    <text x="200" y="25" class="small">Gateway 内部</text>
    <rect x="170" y="38" width="22" height="14" class="storage"/>
    <text x="200" y="49" class="small">存储</text>
    <rect x="320" y="14" width="22" height="14" class="neutral"/>
    <text x="350" y="25" class="small">辅助 / 部署</text>
    <line x1="320" y1="44" x2="350" y2="44" class="edgeBold" marker-end="url(#arrowBold)"/>
    <text x="358" y="49" class="small">主链路</text>
    <line x1="430" y1="44" x2="460" y2="44" class="edge" marker-end="url(#arrow)"/>
    <text x="468" y="49" class="small">次链路</text>
  </g>
</svg>
