name: claw_hub
description: "ClawHub - Multi-OpenClaw Instance Mobile Management Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理 - Riverpod (SSOT 规范)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 注解工具(@visibleForTesting / @immutable 等)
  meta: ^1.16.0

  # 本地数据库 - Drift (SQLite)
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.30

  # 安全存储
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  workmanager: ^0.9.0+3

  # 网络通信
  web_socket_channel: ^3.0.2
  connectivity_plus: ^6.1.4
  # 设备型号读取(用于 Gateway 握手上报 client.modelIdentifier)
  # iOS 需 `cd ios && pod install`;Android 要求 minSdkVersion >= 21
  device_info_plus: ^11.0.0

  # 路由导航
  go_router: ^14.8.1

  # 工具
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.7+1
  mobile_scanner: ^7.2.0
  ed25519_edwards: ^0.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

  # 测试
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.14
  drift_dev: ^2.25.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  convert: any
flutter:
  uses-material-design: true

  assets:
    - assets/mock/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "docs/design/assets/xiahub-icon-v4.png"
  adaptive_icon_background: "#111110"
  adaptive_icon_foreground: "docs/design/assets/xiahub-icon-v4.png"

flutter_native_splash:
  color: "#111110"
  image: "docs/design/assets/xiahub-splash-v3.png"
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
