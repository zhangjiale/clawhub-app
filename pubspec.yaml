name: claw_hub
description: "ClawHub - Multi-OpenClaw Instance Mobile Management Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理 - Riverpod (SSOT 规范)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 本地数据库 - Drift (SQLite)
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.30

  # 安全存储
  flutter_secure_storage: ^9.2.4

  # 网络通信
  web_socket_channel: ^3.0.2
  connectivity_plus: ^6.1.4

  # 路由导航
  go_router: ^14.8.1

  # 工具
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 测试
  mocktail: ^1.0.4

  # 代码生成
  build_runner: ^2.4.14
  drift_dev: ^2.25.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/mock/
