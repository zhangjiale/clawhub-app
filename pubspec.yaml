name: claw_hub
description: "ClawHub - Multi-OpenClaw Instance Mobile Management Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理 - Riverpod (SSOT 规范)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 注解工具(@visibleForTesting / @immutable 等)
  meta: ^1.16.0

  # 本地数据库 - Drift (SQLite)
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.30

  # 安全存储
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  workmanager: ^0.9.0+3

  # 网络通信
  web_socket_channel: ^3.0.2
  connectivity_plus: ^6.1.4
  # 设备型号读取(用于 Gateway 握手上报 client.modelIdentifier)
  # iOS 需 `cd ios && pod install`;Android 要求 minSdkVersion >= 21
  device_info_plus: ^11.0.0

  # 路由导航
  go_router: ^14.8.1

  # 工具
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.7+1
  mobile_scanner: ^7.2.0
  # 读取 App 版本号 + build number 显示在 splash 底部
  package_info_plus: ^8.0.0
  ed25519_edwards: ^0.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  flutter_local_notifications: ^18.0.1

  # Native splash 运行时 API（FlutterNativeSplash.preserve/remove），让 native
  # splash 跨 init 阶段持续显示，去掉 Flutter SplashScreen 后只露 native 一层
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

  # 测试
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.14
  drift_dev: ^2.25.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  convert: any
flutter:
  uses-material-design: true

  assets:
    - assets/mock/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "docs/design/assets/xiahub-icon-v9.png"
  adaptive_icon_background: "#111110"
  adaptive_icon_foreground: "docs/design/assets/xiahub-icon-v9.png"

flutter_native_splash:
  # 暖色 native splash（#FDD3BC 桃粉）。与 Android values/colors.xml 的
  # splash_bg + values-v31/styles.xml 的 windowSplashScreenBackground +
  # iOS LaunchScreen 三处同色 → 启动 native->Flutter handoff 零背景跳变。
  # 注：App 主体 ThemeMode.dark（XiaColors.bg = #08090D），splash→app 是
  # "晨光 → 暗色工作台"过渡，由 Flutter 侧 router 自然衔接（无 SplashScreen
  # 插画过渡）。
  color: "#FDD3BC"
  color_dark: "#FDD3BC"

  # native splash 唯一图源 = xiahub-icon-v6-splash.png（v6 缩到 90% 后
  # 居中放回 1024 画布，留约 5% × 2 透明 padding 安全边）。Flutter 侧
  # SplashScreen 已删除（plan 2026-07-10 native-only 方案），native splash
  # 在 Flutter 接管前独显 → 这是用户冷启动唯一看见的 splash 层。
  # 注：launcher icon（mipmap/ic_launcher.png + iOS AppIcon）仍用 v9，splash
  # 图与 app icon 解耦由本块单独管理。splash 资源由 scripts/make_splash_asset.py
  # 生成（重跑脚本需重新 :create）。
  image: docs/design/assets/xiahub-icon-v6-splash.png

  # Android 12+ SplashScreen API 结构性强制 icon-based（圆形遮罩 ≤240dp
  # viewport）。v6 原图贴边（钳子/腿/触角几乎到画布边），直接用作 splash
  # 会被 240dp 圆切掉钳尖和触角。改用 90% 缩放 + 居中 padding 版本：
  # 实测圆形 viewport 内钳尖/触角/腿尖都在边界内，约 140px（19.4%）安全边。
  # 见 docs/design/assets/xiahub-icon-v6-splash_preview.png（不入版本）。
  android_12:
    color: "#FDD3BC"
    image: docs/design/assets/xiahub-icon-v6-splash.png

  # iOS：scaleAspectFill 让 v9 全屏铺满 launch_background，无 letterbox。
  ios_content_mode: scaleAspectFill
  fullscreen: true

  # 现有配置保留
  android: true
  ios: true
  web: false
