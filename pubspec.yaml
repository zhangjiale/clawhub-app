name: claw_hub
description: "ClawHub - Multi-OpenClaw Instance Mobile Management Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 状态管理 - Riverpod (SSOT 规范)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 注解工具(@visibleForTesting / @immutable 等)
  meta: ^1.16.0

  # 本地数据库 - Drift (SQLite)
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.30

  # 安全存储
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  workmanager: ^0.9.0+3

  # 网络通信
  web_socket_channel: ^3.0.2
  connectivity_plus: ^6.1.4
  # 设备型号读取(用于 Gateway 握手上报 client.modelIdentifier)
  # iOS 需 `cd ios && pod install`;Android 要求 minSdkVersion >= 21
  device_info_plus: ^11.0.0

  # 路由导航
  go_router: ^14.8.1

  # 工具
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_markdown: ^0.7.7+1
  mobile_scanner: ^7.2.0
  # 读取 App 版本号 + build number 显示在 splash 底部
  package_info_plus: ^8.0.0
  ed25519_edwards: ^0.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

  # 测试
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  integration_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.14
  drift_dev: ^2.25.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3

  convert: any
flutter:
  uses-material-design: true

  assets:
    - assets/mock/
    # mascot logo（v6 透明 PNG，1024×1024 RGBA）。
    # 当前字节与 docs/design/assets/xiahub-icon-v6.png 完全一致（MD5 同），
    # Flutter SplashScreen (ClipOval 192dp) + Android 12+ windowSplashScreenAnimatedIcon
    # + pre-v31 launch_background 共用此资源 → 启动 handoff 三层视觉对齐。
    # 已知限制：右下角"豆包AI生成"水印可见（用户接受为临时方案）；
    # 后续干净抠图版替换为单独 PR，路径不要擅自动。
    - docs/design/assets/xiahub-logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "docs/design/assets/xiahub-icon-v7.png"
  adaptive_icon_background: "#111110"
  adaptive_icon_foreground: "docs/design/assets/xiahub-icon-v7.png"

flutter_native_splash:
  # 强制暗色（board 评审 + brainstorming 决定）：
  # color + color_dark 都用 V2 暗色 bg = #08090D = XiaColors.bg
  # App 本身 ThemeMode.dark，OS 明色时也显示暗色 splash
  color: "#08090D"
  color_dark: "#08090D"
  # native 阶段纯色无图（plan 2026-07-08）：mascot 只在 Flutter SplashScreen
  # 层渲染，native->Flutter handoff 唯一变化 = mascot 淡入，零尺寸/位置/背景
  # 跳变。原单张海报 center/cover/fill 跨层缩放矛盾由此根除。不设 image ->
  # 插件 showImage=false，launch_background.xml 只剩 background item（纯色 fill）。

  # Android 12+ SplashScreen API 结构性强制 icon-based（圆形遮罩 ≤240dp）。
  # 不设 image -> 回退 launcher icon（~100ms 圆形闪现）-> 纯色。接受此结构性
  # 过渡，不做 postSplashScreenTheme 抑制（代价过大，列 future work）。
  # mascot 仍只 Flutter 显示，与其他平台一致。
  android_12:
    color: "#08090D"

  # iOS：纯色下 contentMode 无视觉影响，scaleAspectFill 避免任何 letterbox。
  ios_content_mode: scaleAspectFill
  fullscreen: true

  # 现有配置保留
  android: true
  ios: true
  web: false
  # android_gravity 已移除：无 image 时此字段无效（插件不写 splash item）。
