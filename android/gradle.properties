org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Workaround: disable Kotlin incremental compilation to avoid "Storage is already registered"
# error caused by KGP version conflicts with Built-in Kotlin (mobile_scanner issue).
# TODO: Remove after mobile_scanner migrates to Built-in Kotlin.
kotlin.incremental=false
kotlin.compiler.execution.strategy=in-process
